<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spec-Driven Dev · Golden Circle</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#0f1117;color:#e8eaed;overflow:hidden;
    width:100vw;height:100vh;
  }
  .stage{
    width:100vw;height:100vh;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    position:relative;overflow:hidden;
  }
  .slide{
    display:none;flex-direction:column;justify-content:center;align-items:center;
    width:86%;max-width:960px;min-height:60vh;
    animation:fadeIn .45s ease-out;
    padding:24px 32px;
  }
  .slide.active{display:flex}

  h1{font-size:2.6rem;font-weight:700;letter-spacing:-.02em;margin-bottom:20px}
  h2{font-size:1.9rem;font-weight:600;margin-bottom:16px}
  h3{font-size:1.4rem;font-weight:500;margin-bottom:12px;color:#9aa0a6}
  p{font-size:1.2rem;line-height:1.7;max-width:780px;text-align:center}
  .gc-why h1{color:#fbbc04}
  .gc-what h1{color:#8ab4f8}
  .gc-how h1{color:#81c995}
  .gc-title h1{background:linear-gradient(135deg,#fbbc04,#f28b82);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .gc-summary h1{background:linear-gradient(135deg,#8ab4f8,#c58af9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .tag{
    display:inline-block;font-size:.8rem;font-weight:600;letter-spacing:.08em;
    padding:4px 14px;border-radius:20px;margin-bottom:14px;text-transform:uppercase;
  }
  .tag-why{background:#fbbc0433;color:#fbbc04}
  .tag-what{background:#8ab4f833;color:#8ab4f8}
  .tag-how{background:#81c99533;color:#81c995}
  .tag-pros{background:#34a85333;color:#34a853}
  .tag-cons{background:#ea433533;color:#ea4335}
  .tag-summary{background:#c58af933;color:#c58af9}

  .grid-3{
    display:grid;grid-template-columns:repeat(3,1fr);gap:20px;width:100%;max-width:860px;margin:12px 0;
  }
  .grid-2{
    display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:660px;margin:12px 0;
  }
  .card{
    background:#1e2029;border-radius:14px;padding:22px 18px;text-align:center;
    border:1px solid #2d2f3a;transition:border-color .2s;
  }
  .card:hover{border-color:#fbbc0466}
  .card .icon{font-size:2rem;margin-bottom:8px}
  .card h4{font-size:1.1rem;font-weight:600;margin-bottom:6px}
  .card p{font-size:.95rem;color:#9aa0a6;line-height:1.5}

  .badge{
    display:inline-flex;align-items:center;gap:6px;
    background:#1e2029;border:1px solid #2d2f3a;
    padding:6px 16px;border-radius:30px;font-size:.95rem;margin:4px;
  }

  .stat-row{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;margin:16px 0}
  .stat{text-align:center}
  .stat .num{font-size:2.8rem;font-weight:700}
  .stat .num.gold{color:#fbbc04}
  .stat .num.blue{color:#8ab4f8}
  .stat .num.green{color:#81c995}
  .stat .num.red{color:#f28b82}
  .stat .num.purple{color:#c58af9}
  .stat .lbl{font-size:.9rem;color:#9aa0a6;margin-top:2px}

  .arrow-flow{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px 0}
  .arrow-flow .node{
    background:#1e2029;border:1px solid #2d2f3a;border-radius:10px;
    padding:12px 18px;text-align:center;min-width:100px;
  }
  .arrow-flow .node .lbl{font-size:.85rem;color:#9aa0a6}
  .arrow-flow .node .val{font-size:1.1rem;font-weight:600;margin-top:2px}
  .arrow-flow .arrow{font-size:1.5rem;color:#5f6368}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:28px;width:100%;max-width:860px;margin:12px 0}
  .two-col .col{text-align:center}

  .list-compact{text-align:left;max-width:680px;margin:10px auto;list-style:none}
  .list-compact li{
    padding:8px 0;font-size:1.1rem;line-height:1.6;
    display:flex;align-items:flex-start;gap:10px;
  }
  .list-compact li::before{content:"▸";color:#fbbc04;font-weight:700}

  .pipeline{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;
  }
  .pipe-step{
    background:#1e2029;border:1px solid #2d2f3a;border-radius:10px;
    padding:10px 16px;text-align:center;min-width:90px;
  }
  .pipe-step .num{font-size:1rem;font-weight:700;color:#8ab4f8}
  .pipe-step .lbl{font-size:.85rem;color:#9aa0a6}
  .pipe-step.gold .num{color:#fbbc04}
  .pipe-step.green .num{color:#81c995}

  .root-cause-box{
    background:#1e2029;border:2px solid #fbbc0466;border-radius:14px;
    padding:24px 32px;text-align:center;max-width:600px;margin:16px 0;
  }
  .root-cause-box .big{font-size:1.6rem;font-weight:700;color:#fbbc04;margin-bottom:8px}
  .root-cause-box .sub{font-size:1rem;color:#9aa0a6;line-height:1.6}

  .spec-flow{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0}
  .spec-flow .item{
    background:#1e2029;border:1px solid #2d2f3a;border-radius:10px;
    padding:10px 14px;text-align:center;min-width:80px;
  }
  .spec-flow .item .lbl{font-size:.8rem;color:#9aa0a6}
  .spec-flow .item .val{font-size:1rem;font-weight:600;margin-top:2px}
  .spec-flow .arrow{font-size:1.3rem;color:#5f6368}

  .spec-step{
    background:#1e2029;border:1px solid #2d2f3a;border-radius:14px;
    padding:20px 24px;text-align:center;max-width:340px;margin:8px;
  }
  .spec-step .emoji{font-size:2rem;margin-bottom:8px}
  .spec-step h4{font-size:1.1rem;font-weight:600;margin-bottom:6px}
  .spec-step p{font-size:.9rem;color:#9aa0a6;line-height:1.5}
  .spec-step .detail{margin-top:10px;font-size:.85rem;color:#5f6368;text-align:left;padding-left:12px}
  .spec-step .detail li{list-style:none;padding:3px 0}
  .spec-step .detail li::before{content:"→ ";color:#8ab4f8}

  .pros-grid,.cons-grid{
    display:flex;flex-direction:column;gap:12px;width:100%;max-width:400px;margin:8px;
  }
  .pros-item,.cons-item{
    background:#1e2029;border-radius:12px;padding:16px 20px;
    display:flex;align-items:center;gap:14px;
  }
  .pros-item{border:1px solid #34a85344}
  .cons-item{border:1px solid #ea433544}
  .pros-item .check{color:#34a853;font-size:1.4rem;font-weight:700}
  .cons-item .cross{color:#ea4335;font-size:1.4rem;font-weight:700}
  .pros-item .txt{font-size:.95rem;color:#e8eaed}
  .pros-item .txt .hl{color:#34a853;font-weight:600}
  .cons-item .txt{font-size:.95rem;color:#e8eaed}
  .cons-item .txt .hl{color:#ea4335;font-weight:600}

  .summary-block{
    background:#1e2029;border:2px solid #c58af944;border-radius:16px;
    padding:32px;text-align:center;max-width:720px;width:100%;margin:16px 0;
  }
  .summary-block .main-line{font-size:1.8rem;font-weight:700;margin-bottom:12px;line-height:1.4}
  .summary-block .sub-line{font-size:1rem;color:#9aa0a6;line-height:1.6;margin-bottom:20px}

  .nav-bar{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;
    background:#1e2029;border:1px solid #2d2f3a;
    padding:8px 20px;border-radius:30px;z-index:100;
  }
  .nav-bar button{
    background:none;border:none;color:#9aa0a6;font-size:1.2rem;
    cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s;
    line-height:1;
  }
  .nav-bar button:hover{color:#e8eaed;background:#2d2f3a}
  .nav-bar .counter{
    font-size:.85rem;color:#5f6368;min-width:48px;text-align:center;
  }
  .nav-dots{display:flex;gap:5px}
  .nav-dots .dot{
    width:8px;height:8px;border-radius:50%;background:#2d2f3a;
    cursor:pointer;transition:all .25s;
  }
  .nav-dots .dot.active{background:#fbbc04;width:20px;border-radius:4px}

  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:700px){
    h1{font-size:1.8rem}
    h2{font-size:1.5rem}
    p{font-size:1rem}
    .grid-3,.grid-2{grid-template-columns:1fr}
    .two-col{grid-template-columns:1fr}
    .slide{width:92%;padding:16px}
    .nav-bar{gap:8px;padding:6px 14px}
  }
</style>
</head>
<body>

<div class="stage" id="stage"></div>
<div class="nav-bar" id="navBar">
  <button id="prevBtn">◀</button>
  <span class="counter" id="counter">1/1</span>
  <div class="nav-dots" id="dots"></div>
  <button id="nextBtn">▶</button>
</div>

<script>
const slides = [
  // ────────────── 1: Title ──────────────
  {
    cls:'gc-title',
    html:`<span class="tag tag-why">GOLDEN CIRCLE</span>
      <h1>Spec-Driven Dev</h1>
      <h2 style="color:#9aa0a6;font-weight:400">명세서가 코드보다 먼저</h2>
      <p style="color:#5f6368;margin-top:30px;font-size:1rem">
        WHY &nbsp;·&nbsp; WHAT &nbsp;·&nbsp; HOW &nbsp;·&nbsp; PROS &amp; CONS
      </p>`
  },
  // ────────────── 2: Agenda ──────────────
  {
    cls:'',
    html:`<h1>Agenda</h1>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:20px;text-align:left">
        <div style="display:flex;align-items:center;gap:14px;padding:12px 20px;background:#1e2029;border-radius:12px;border-left:4px solid #fbbc04">
          <span style="font-size:1.4rem;font-weight:700;color:#fbbc04">01</span>
          <div><strong style="color:#fbbc04">WHY</strong><br><span style="font-size:.9rem;color:#9aa0a6">추측 기반 코딩 · 문서 격차 · 재현 불가능 · 근본 원인</span></div>

          <span style="font-size:1.4rem;font-weight:700;color:#8ab4f8">02</span>
          <div><strong style="color:#8ab4f8">WHAT</strong><br><span style="font-size:.9rem;color:#9aa0a6">Spec = SSOT · 9단계 연동 · Spec Matrix</span></div>

        <div style="display:flex;align-items:center;gap:14px;padding:12px 20px;background:#1e2029;border-radius:12px;border-left:4px solid #81c995">
          <span style="font-size:1.4rem;font-weight:700;color:#81c995">03</span>
          <div><strong style="color:#81c995">HOW</strong><br><span style="font-size:.9rem;color:#9aa0a6">Spec 작성 · 리뷰 · 코드 생성 (1:1)</span></div>

        <div style="display:flex;align-items:center;gap:14px;padding:12px 20px;background:#1e2029;border-radius:12px;border-left:4px solid #34a853">

          <div><strong style="color:#34a853">PROS &amp; CONS</strong><br><span style="font-size:.9rem;color:#9aa0a6">효과와 한계 + 요약</span></div>
        </div>
      </div>`
  },
  // ────────────── 3: WHY - Problem 1 ──────────────
  {
    cls:'gc-why',
    html:`<span class="tag tag-why">WHY · 문제 1</span>
      <h1>추측 기반 코딩</h1>
      <p>명세서 없이 시작하면 개발자의 <strong style="color:#fbbc04">추측</strong>이 실제 요구사항을 대체합니다.</p>
      <div class="grid-3" style="margin-top:24px">
        <div class="card" style="border-color:#f28b8244">
          <div class="icon">🤔</div>
          <h4>요구사항 불일치</h4>

        </div>
        <div class="card" style="border-color:#f28b8244">
          <div class="icon">🔄</div>
          <h4>반복 재작업</h4>
          <p>"이게 아니에요" —<br>개발 시간의 40%가 재작업</p>

          <div class="icon">🎯</div>

          <p>목표가 불명확하면<br>코드는 표류합니다</p>

  },
  // ────────────── 4: WHY - Problem 2 ──────────────
  {
    cls:'gc-why',
    html:`<span class="tag tag-why">WHY · 문제 2</span>
      <h1>문서와 코드 격차</h1>
      <p>구현이 완료되면 문서는 항상 <strong style="color:#fbbc04">구식</strong>이 됩니다.</p>
      <div class="two-col" style="max-width:700px;margin-top:20px">
        <div class="col">
          <div style="background:#1e2029;border:1px solid #f28b8244;border-radius:14px;padding:24px">
            <div style="font-size:2.4rem;font-weight:700;color:#34a853">코드</div>
            <p style="font-size:.95rem;color:#e8eaed;margin-top:10px">매일 진화</p>
          </div>
        </div>
        <div class="col">
          <div style="background:#1e2029;border:1px solid #f28b8244;border-radius:14px;padding:24px">
            <div style="font-size:2.4rem;font-weight:700;color:#f28b82">문서</div>
            <p style="font-size:.95rem;color:#e8eaed;margin-top:10px">작성 후 방치</p>
          </div>
        </div>
      </div>
      <div style="background:#1e2029;border:1px solid #2d2f3a;border-radius:12px;padding:18px 24px;margin-top:16px;max-width:600px">
        <p style="font-size:.95rem;color:#9aa0a6">
          <strong style="color:#f28b82">격차의 결과:</strong> 신규 개발자 온보딩 2배 시간 ·<br>
          유지보수 비용 기하급수적 증가 · 시스템 이해도 저하
        </p>
      </div>`
  },
  // ────────────── 5: WHY - Problem 3 ──────────────
  {
    cls:'gc-why',
    html:`<span class="tag tag-why">WHY · 문제 3</span>
      <h1>재현 불가능</h1>
      <p>결정의 <strong style="color:#fbbc04">맥락</strong>이 기록되지 않으면, 모든 것이 '재발견'이 됩니다.</p>
      <div class="grid-3" style="margin-top:20px">
        <div class="card" style="border-color:#f28b8244">
          <div class="icon">❓</div>
          <h4>"왜 이렇게 했지?"</h4>
          <p>6개월 후 아무도<br>그 이유를 모릅니다</p>
        </div>
        <div class="card" style="border-color:#f28b8244">
          <div class="icon">🔁</div>
          <h4>재발견 강요</h4>
          <p>과거의 결정을 다시<br>연구하고 검증해야 함</p>
        </div>
        <div class="card" style="border-color:#f28b8244">
          <div class="icon">📉</div>
          <h4>기술 부채 누적</h4>
          <p>기록 없는 결정이<br>돌이킬 수 없는 부채로</p>
        </div>
      </div>
      <p style="color:#9aa0a6;font-size:.95rem;margin-top:8px">"기록하지 않은 결정은 존재하지 않은 것과 같다"</p>`
  },
  // ────────────── 6: WHY - Root Cause ──────────────
  {
    cls:'gc-why',
    html:`<span class="tag tag-why">WHY · 근본 원인</span>
      <h1>Spec 없는 개발</h1>
      <div class="root-cause-box">
        <div class="big">세 가지 문제의 공통 원인</div>
        <div class="sub">
          설계 결정을 강제로 기록하고 검증하는<br>
          <strong style="color:#fbbc04">메커니즘</strong>이 없다는 것
        </div>
      </div>
      <div class="arrow-flow" style="max-width:600px;margin:10px auto">
        <div class="node" style="border-color:#f28b8266">
          <div class="val">명세 없음</div>
          <div class="lbl">요구사항 불일치</div>
        </div>
        <div class="arrow" style="color:#5f6368">→</div>
        <div class="node" style="border-color:#f28b8266">
          <div class="val">기록 없음</div>
          <div class="lbl">문서 격차</div>
        </div>
        <div class="arrow" style="color:#5f6368">→</div>
        <div class="node" style="border-color:#f28b8266">

  // ────────────── 7: WHAT - Spec = SSOT ──────────────
  {
    cls:'gc-what',
    html:`<span class="tag tag-what">WHAT · 해결책</span>
      <h1>Spec = SSOT</h1>
      <p>Single Source of Truth.<br>모든 변경은 반드시 <strong style="color:#8ab4f8">Spec을 경유</strong>합니다.</p>

  // ────────────── 8: WHAT - 9단계 연동 ──────────────
  {
    cls:'gc-what',
    html:`<span class="tag tag-what">WHAT · 9단계 연동</span>
      <h1>설계 게이트: design.md</h1>
      <p>설계 단계 진입 시 <strong style="color:#8ab4f8">Spec design.md</strong> 자동 생성</p>
      <div class="pipeline" style="margin-top:16px">
        <div class="pipe-step gold"><div class="num">1</div><div class="lbl">요청</div></div>
        <div class="pipe-step gold"><div class="num">2</div><div class="lbl">분석</div></div>
        <div class="pipe-step" style="border-color:#8ab4f866"><div class="num">3</div><div class="lbl">설계</div></div>
        <div class="pipe-step" style="border-color:#8ab4f866"><div class="num">4</div><div class="lbl">승인</div></div>
        <div class="pipe-step green"><div class="num">5</div><div class="lbl">구현</div></div>
        <div class="pipe-step green"><div class="num">6</div><div class="lbl">검토</div></div>
        <div class="pipe-step green"><div class="num">7</div><div class="lbl">테스트</div></div>
        <div class="pipe-step"><div class="num">8</div><div class="lbl">배포</div></div>
        <div class="pipe-step"><div class="num">9</div><div class="lbl">확인</div></div>

// ── render engine ──
let idx = 0;
const stage = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('counter');

function render(n){
  const s = slides[n];
  stage.innerHTML = `<div class="slide active ${s.cls||''}">${s.html}</div>`;
  counter.textContent = `${n+1}/${slides.length}`;
  Array.from(dotsEl.children).forEach((d,i)=>d.classList.toggle('active',i===n));
}
document.getElementById('prevBtn').onclick = ()=>{ idx=(idx-1+slides.length)%slides.length; render(idx); };
document.getElementById('nextBtn').onclick = ()=>{ idx=(idx+1)%slides.length; render(idx); };
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();idx=(idx+1)%slides.length;render(idx);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();idx=(idx-1+slides.length)%slides.length;render(idx);}
  if(e.key==='Home'){e.preventDefault();idx=0;render(idx);}
  if(e.key==='End'){e.preventDefault();idx=slides.length-1;render(idx);}
});

(function initDots(){
  for(let i=0;i<slides.length;i++){
    const d=document.createElement('div');d.className='dot';
    d.onclick=()=>{idx=i;render(idx);};
    dotsEl.appendChild(d);
  }
  render(0);
})();
</script>
