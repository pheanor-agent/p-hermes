<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>p-hermes Knowledge System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f0f3f4; color: #333; }
        .slide-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .slide { display: none; width: 80%; max-width: 1000px; text-align: center; }
        .slide.active { display: block; animation: fadeIn 0.5s; }
        h1 { font-size: 2.8rem; color: #2c3e50; }
        p, li { font-size: 1.4rem; line-height: 1.6; }
        .layer { border: 2px solid #9b59b6; background: #fff; padding: 15px; margin: 10px auto; width: 60%; border-radius: 8px; }
        .layer h3 { margin: 0; color: #8e44ad; }
        .arrow { font-size: 2rem; color: #9b59b6; margin: 5px 0; }
        .nav-btn { position: absolute; bottom: 20px; padding: 10px 20px; font-size: 1.2rem; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 5px; }
        .nav-btn#next { right: 20px; } .nav-btn#prev { left: 20px; }
        .progress { position: fixed; bottom: 0; left: 0; height: 5px; background: #9b59b6; transition: width 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .details { display: none; background: #f4ecf7; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 1.1rem; text-align: left; }
        .toggle-btn { background: #1abc9c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="progress" id="progress"></div>
        <button class="nav-btn" id="prev">이전</button>
        <button class="nav-btn" id="next">다음</button>
    </div>
    <script>
        const slides = [
            { title: "Knowledge System Architecture", content: "<p>방대한 데이터를 구조화하고,<br>에이전트에게 '정확한 사실'만을 제공하는 파이프라인</p>" },
            { title: "지식 계층 구조", content: "<div class='layer'><h3>1. Source (원본)</h3>Session, JOB, News, References</div><div class='arrow'>↓</div><div class='layer'><h3>2. Processing (가공 파이프라인)</h3>중복 제거, 핵심 추출, 도메인 분류</div><div class='arrow'>↓</div><div class='layer'><h3>3. Wiki DB (저장)</h3>Domain/Tag 기반 FTS5 검색</div><div class='arrow'>↓</div><div class='layer'><h3>4. Context Injection (로드)</h3>작업 컨텍스트에 맞는 사실만 주입</div>" },
            { title: "Domain 기반 분류", content: "<ul><li><b>system/</b>: 아키텍처 변경, 시스템 구성 정보</li><li><b>dev/</b>: 개발 규칙, 스킬, 테스트 메커니즘</li><li><b>custom/</b>: 사용자 맞춤형 워크플로우</li><li><b>knowledge/</b>: 지식 시스템 자체의 메타 데이터</li></ul><button class='toggle-btn' onclick='toggle(this)'>상세 보기</button><div class='details'>에이전트는 막연하게 '기억'하는 것이 아니라, 구조화된 파일 시스템에서 지식을 검색합니다. SQLite FTS5를 통해 나노초 단위로 필요한 사실만 찾아옵니다.</div>" },
            { title: "가공 파이프라인의 중요성", content: "<p>원본(Session History 등)을 그대로 읽으면:</p><ul><li><b>Context Overflow</b>: 핵심 정보가 밀려남</li><li><b>추론 오염</b>: 맥락이 다른 과거 발언을 사실로 착각</li></ul><p style='margin-top:20px;'><b>해결책:</b> 5분 간격의 주기적 가공(`wiki-process-filings.sh`)을 통해 '가공된 사실'만을 Wiki DB에 저장합니다.</p>" },
            { title: "FTS5 Full-Text Search", content: "<p>지식 검색은 LLM의 추측이 아닌, <b>데이터베이스 쿼리</b>로 수행됩니다.</p><pre style='text-align:left; font-size:1rem;'>SELECT snippet(knowledge_fts) FROM knowledge_fts WHERE knowledge_fts MATCH '5-Tier architecture';</pre><p>이는 에이전트의 환각(Hallucination)을 근본적으로 차단합니다.</p>" },
            { title: "Reference & Links", content: "<p>자세한 내용은 아래 링크에서 확인하세요.</p><ul><li>Guide Wiki: <a href='../wiki/index.html'>wiki/</a></li><li>Dev Blog: <a href='../blog/index.html'>blog/</a></li><li>Architecture: <a href='../ARCHITECTURE.html'>architecture/</a></li></ul>" }
        ];
        let current = 0;
        function showSlide(n) {
            const container = document.querySelector('.slide-container');
            container.querySelectorAll('.slide').forEach(s => s.remove());
            const div = document.createElement('div');
            div.className = 'slide active';
            div.innerHTML = `<h1>${slides[n].title}</h1>${slides[n].content}`;
            container.insertBefore(div, document.querySelector('.progress'));
            document.getElementById('progress').style.width = ((n+1)/slides.length*100) + '%';
        }
        document.getElementById('next').onclick = () => { current = (current+1)%slides.length; showSlide(current); };
        document.getElementById('prev').onclick = () => { current = (current-1+slides.length)%slides.length; showSlide(current); };
        function toggle(btn) { const d = btn.nextElementSibling; d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        showSlide(0);
    </script>
</body>
</html>
