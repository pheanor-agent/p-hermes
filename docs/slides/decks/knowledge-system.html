<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <section class="title-slide">
        <p style="color: var(--r-heading-color); margin-bottom: 1rem;">p-hermes</p>
        <h1>Knowledge System</h1>
        <p>지식 계층 구조 및 파이프라인</p>
      </section>

      <section>
        <h2>지식 계층</h2>
        <ul>
          <li class="fragment">T1 Core: 시스템 핵심 지식</li>
          <li class="fragment">T2 Reference: 외부 리퍼런스</li>
          <li class="fragment">T3 Filing: 작업 산출물</li>
        </ul>
      </section>

      <section>
        <h2>Wiki 파이프라인</h2>
        <pre><code data-trim>
inbox.md → 분류 → T1/T2/T3 → scoring → index.md
        </code></pre>
      </section>

      <section>
        <h2>Scoring 시스템</h2>
        <table>
          <tr><td>T1</td><td>핵심</td><td>상시 검색</td></tr>
          <tr><td>T2</td><td>리퍼런스</td><td>필요 시 참조</td></tr>
          <tr><td>T3</td><td>일시적</td><td>작업 중만 필요</td></tr>
        </table>
      </section>

      <section>
        <h2>핵심 요약</h2>
        <ul>
          <li>3계층 지식 구조</li>
          <li>자동화된 분류</li>
          <li>점수 기반 검색</li>
        </ul>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      controls: true,
      progress: true,
      center: true,
      transition: 'slide'
    });
  </script>
</body>
</html>
