<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>p-hermes Architecture 5-Tier</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #fdf2e9; color: #333; }
        .slide-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .slide { display: none; width: 80%; max-width: 1000px; text-align: center; }
        .slide.active { display: block; animation: fadeIn 0.5s; }
        h1 { font-size: 2.8rem; color: #2c3e50; }
        p, li { font-size: 1.4rem; line-height: 1.6; }
        .tier { border: 2px solid #d35400; background: #fff; padding: 15px; margin: 10px auto; width: 60%; border-radius: 8px; }
        .tier h3 { margin: 0; color: #e67e22; }
        .arrow { font-size: 2rem; color: #d35400; margin: 5px 0; }
        .nav-btn { position: absolute; bottom: 20px; padding: 10px 20px; font-size: 1.2rem; cursor: pointer; background: #d35400; color: white; border: none; border-radius: 5px; }
        .nav-btn#next { right: 20px; } .nav-btn#prev { left: 20px; }
        .progress { position: fixed; bottom: 0; left: 0; height: 5px; background: #d35400; transition: width 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .details { display: none; background: #fae5d3; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 1.1rem; text-align: left; }
        .toggle-btn { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="progress" id="progress"></div>
        <button class="nav-btn" id="prev">이전</button>
        <button class="nav-btn" id="next">다음</button>
    </div>
    <script>
        const slides = [
            { title: "5-Tier 물리 계층화 설계", content: "<p>파일 시스템의 구조가 소프트웨어 아키텍처를 반영합니다.</p><p>도메인별 물리적 격리로 의존성 순환 및 데이터 오염을 차단합니다.</p>" },
            { title: "Tier 1 & 2: Core & Runtime", content: "<div class='tier'><h3>1. Core (정적 설정)</h3>config.yaml, AGENTS.md, skills/</div><div class='arrow'>↓</div><div class='tier'><h3>2. Runtime (동적 상태)</h3>세션 이력, JOB 데이터, 메모리 상태</div><p>Core는 변경되지 않는 소프트웨어의 영혼입니다. Runtime은 에이전트의 현재 기억과 컨텍스트를 저장합니다.</p>" },
            { title: "Tier 3 & 4: Interfaces & Infra", content: "<div class='tier'><h3>3. Interfaces (외부 인터페이스)</h3>Discord, Telegram, Webhook</div><div class='arrow'>↓</div><div class='tier'><h3>4. Infra (지속적 상태)</h3>knowledge/, cron/, backups/</div><p>Interfaces는 외부 플랫폼과의 교신 채널입니다. Infra는 시스템의 장기 기억과 주기 작업을 담당합니다.</p>" },
            { title: "Tier 5: Release", content: "<div class='tier'><h3>5. Release (배포 데이터)</h3>docs/, wiki/, llms.txt, slides/</div><p>외부에 노출되거나 배포될 데이터가 저장됩니다. GitHub Pages를 통해 공개됩니다.</p>" },
            { title: "심링크(Symlink) 금지 원칙", content: "<p>왜 심링크를 사용하지 않을까?</p><ul><li>LLM의 파일 탐색 효율을 급격히 저하시킴</li><li>'파일은 있는데 왜 못 읽어?' 오류 빈번 발생</li><li>물리적 inode 확인이 불가능하여 삭제 시 위험 증가</li></ul><button class='toggle-btn' onclick='toggle(this)'>상세 보기</button><div class='details'>대신 상태 파일과 이벤트 기반의 비동기 동기화(Blackboard 패턴)를 사용합니다.</div>" },
            { title: "Reference & Links", content: "<p>자세한 내용은 아래 링크에서 확인하세요.</p><ul><li>Guide Wiki: <a href='../wiki/index.html'>wiki/</a></li><li>Dev Blog: <a href='../blog/index.html'>blog/</a></li><li>Architecture: <a href='../ARCHITECTURE.html'>architecture/</a></li></ul>" }
        ];
        let current = 0;
        function showSlide(n) {
            const container = document.querySelector('.slide-container');
            container.querySelectorAll('.slide').forEach(s => s.remove());
            const div = document.createElement('div');
            div.className = 'slide active';
            div.innerHTML = `<h1>${slides[n].title}</h1>${slides[n].content}`;
            container.insertBefore(div, document.querySelector('.progress'));
            document.getElementById('progress').style.width = ((n+1)/slides.length*100) + '%';
        }
        document.getElementById('next').onclick = () => { current = (current+1)%slides.length; showSlide(current); };
        document.getElementById('prev').onclick = () => { current = (current-1+slides.length)%slides.length; showSlide(current); };
        function toggle(btn) { const d = btn.nextElementSibling; d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        showSlide(0);
    </script>
</body>
</html>
