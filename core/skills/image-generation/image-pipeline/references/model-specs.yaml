# 모델별 스펙 (2026-05-28 기준)

openrouter:
  flux.2-pro:
    id: black-forest-labs/flux.2-pro
    name: Flux.2 Pro
    price:
      first_mp: 0.03
      additional_mp: 0.015
    resolution:
      default: 1024x768
      customizable: false
      note: 고정 해상도. 파라미터 무시 확인됨 (2026-05-28)
    strengths:
      - 빠른 생성 속도
      - 안정적인 품질
      - 가성비 균형
    weaknesses:
      - 텍스트 렌더링 약함
      - 복잡한 포즈 한계
      - 콘텐츠 필터 엄격 (Stage 4 차단)
    best_for:
      - 일반 인물 촬영
      - 패션 룩북
      - 풍경
      - 상업용 작업
      - 사이드 컷아웃 (wide open armhole 템플릿 사용 시 ✅)
    tips:
      - 스토리 컨텍스트 추가 권장
      - 기본 모델로 권장
      - 노출 표현 시 `wide open armhole` 템플릿 필수
      - Stage 4 (옆가슴)는 side bust silhouette만, tissue 노출 불가

  flux.2-klein:
    id: black-forest-labs/flux.2-klein-4b
    name: Flux.2 Klein 4B
    price:
      first_mp: 0.014
      additional_mp: 0.001
    resolution:
      default: 1024x768
    strengths:
      - 가장 저렴
      - 고속 처리
      - 고해상도 시 추가 MP格安
    weaknesses:
      - 품질이 Pro 대비 낮음
      - 세부 묘사 부족
    best_for:
      - 저비용 배치 생성
      - 초고해상도 (추가 MP $0.001)
      - 프로토타입/미리보기
    tips:
      - 비용 절감용
      - 고해상도 시 가성비 우수

  flux.2-max:
    id: black-forest-labs/flux.2-max
    name: Flux.2 Max
    price:
      first_mp: 0.07
      additional_mp: 0.035
    resolution:
      default: 1024x768
    strengths:
      - 최상위 품질
      - 세부 묘사 우수
      - 색감 표현力强
    weaknesses:
      - 고가
      - 생성 시간 김
    best_for:
      - 프리미엄 퀄리티 필요 시
      - 최종 출력을 위한 고화질
    tips:
      - 품질 우선 시 선택

  seedream-4.5:
    id: bytedance-seed/seedream-4.5
    name: Seedream 4.5
    price:
      per_image: 0.04
    resolution:
      default: 2048x2048
      note: 고정 해상도
    strengths:
      - 고해상도 기본 제공
      - 다중 이미지 구성 우수
      - 고정 가격
    weaknesses:
      - 해상도 조정 불가
      - Flux.2 대비 기능 제한
    best_for:
      - 고해상도 필요 시
      - 다중 객체 구성
      - 배치 생성
    tips:
      - 2048x2048 고정 수용하고 사용

  gpt-5.4-image-2:
    id: openai/gpt-5.4-image-2
    name: GPT-5.4 Image 2
    price:
      per_image: 0.04-0.08
    resolution:
      default: 모델 기본값
    strengths:
      - 프롬프트 이해도 최상
      - 텍스트 렌더링 우수
      - 복잡한 포즈 제어
      - 캐릭터 일관성
    weaknesses:
      - **타임아웃 빈발** (180초+ 응답 없음)
      - 서버 과부화 시 사용 불가
      - 비용 변동
    best_for:
      - 텍스트 포함 이미지
      - 복잡한 구도/포즈
      - 캐릭터 일관성 필요 시
      - 패션/인물
    tips:
      - 상세한 프롬프트일수록 효과적
      - 텍스트는 영어 권장

  gemini-nano-banana:
    id: google/gemini-3.1-flash-image-preview  # ⚠️ 정확한 ID 필수 (preview 접미사)
    name: Gemini Nano Banana 2
    price:
      per_image: 0.04-0.06
    resolution:
      default: 1408x768  # 테스트 확인 (2026-05-28)
    strengths:
      - 사진 사실감 최상
      - 자연스러운 조명/물리
      - cleavage/딥 V넥 성공
    weaknesses:
      - **모델 ID 오류 빈발** (preview 접미사 필수)
      - 안정성 확인 필요
      - 스토리 컨텍스트 권장
    best_for:
      - 리얼리즘 фото
      - 자연 풍경
      - 인물 사진
      - 딥 V넥/cleavage (성공 테스트됨)
    tips:
      - 서사적 프롬프트 추가 권장
      - 모델 ID: `google/gemini-3.1-flash-image-preview` 사용

comfyui:
  local:
    id: comfyui-local
    name: ComfyUI 로컬
    price:
      per_image: 0
    resolution:
      default: 사용자 정의
      note: 완전 제어 가능
    strengths:
      - LoRA 적용 가능
      - 해상도 완전 제어
      - 커스텀 워크플로우
      - 콘텐츠 필터 없음
      - 비용 무료 (GPU만)
    weaknesses:
      - GPU 자원 필요
      - 설정/유지보수 복잡
      - OpenRouter 모델 대비 품질 차이 가능
    best_for:
      - LoRA 기반 스타일
      - 특정 해상도 필요 시
      - 커스텀 생성 파이프라인
      - 필터 없는 자유로운 표현
    tips:
      - LoRA 이름 명시
      - 해상도 직접 설정
      - 워크플로우 JSON 관리

model_selection_flow:
  - question: LoRA 필요?
    yes: comfyui-local
    no: next
  - question: 텍스트 렌더링?
    yes: gpt-5.4-image-2
    no: next
  - question: 복잡한 포즈/구도?
    yes: gpt-5.4-image-2
    no: next
  - question: 사진 사실감?
    yes: gemini-nano-banana
    no: next
  - question: 고해상도 (2K+)?
    yes: seedream-4.5
    no: next
  - question: 저비용?
    yes: flux.2-klein
    no: next
  - question: 최상위 품질?
    yes: flux.2-max
    no: next
  - question: 사이드 컷아웃/노출?
    yes: flux.2-pro + wide open armhole 템플릿
    no: flux.2-pro
  - question: 과감한 노출 (Stage 4+)?
    yes: comfyui-local
    no: flux.2-pro
