# ComfyUI + Tailscale Docker Template

**Created**: 2026-05-17 (JOB-1167)
**Purpose**: Canonical Docker Compose template for remote ComfyUI server with Tailscale networking

## Architecture

- **Hermes** (WSL) → REST API → **ComfyUI** (remote PC via Tailscale)
- **OpenClaw** → System monitoring only (no ComfyUI control)

## Key Changes from Legacy Setup

| Before | After |
|--------|-------|
| OpenClaw node in ComfyUI container | Removed |
| OpenClaw → ComfyUI control | Hermes → ComfyUI direct (REST API) |
| `ports: - "8188:8188"` | `network_mode: service:tailscale` (Tailscale only) |
| Custom Dockerfile for OpenClaw node | Standard ai-dock image |

## docker-compose.yml

```yaml
services:
  # Tailscale Sidecar
  tailscale:
    image: tailscale/tailscale:stable
    container_name: ts-sidecar
    hostname: comfyui-node
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=1
      - TS_HOSTNAME=comfyui-node
    volumes:
      - ./tailscale-data:/var/lib/tailscale
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ComfyUI (OpenClaw node removed)
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: comfyui-sandbox
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CLI_ARGS=--lowvram --preview-method auto
      - WEB_ENABLE_AUTH=${COMFYUI_AUTH_ENABLED:-false}
    volumes:
      - ./models/checkpoints:/opt/ComfyUI/models/checkpoints:ro
      - ./models/clip:/opt/ComfyUI/models/clip:ro
      - ./models/vae:/opt/ComfyUI/models/vae:ro
      - ./models/embeddings:/opt/ComfyUI/models/embeddings:ro
      - ./models/loras:/opt/ComfyUI/models/loras:ro
      - ./models/unet:/opt/ComfyUI/models/unet:ro
      - ./models/controlnet:/opt/ComfyUI/models/controlnet:ro
      - ./models/text_encoders:/opt/ComfyUI/models/text_encoders:ro
      - ./output:/opt/ComfyUI/output
      - ./custom_nodes:/opt/ComfyUI/custom_nodes
      - ./temp:/opt/ComfyUI/temp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    network_mode: service:tailscale

volumes: {}
```

## .env Variables

```env
# Tailscale auth key (required)
TS_AUTHKEY=tskey-...

# ComfyUI web auth (optional, disabled by default on Tailscale internal network)
COMFYUI_AUTH_ENABLED=false
```

## Model Requirements (Flux2 Klein GGUF)

**Critical**: Flux2 Klein 9B models use GGUF format and require custom loader nodes:

1. **Base model**: `flux-2-klein-9b-Q4_K_M.gguf` (GGUF format)
2. **CLIP**: `Qwen3-8B-Q4_K_M.gguf` (type: flux2)
3. **VAE**: `flux2-vae.safetensors`

**Custom nodes required**: Install `ComfyUI-GGUF` or equivalent GGUF loader before using GGUF-format models.

## PowerShell Commands (Windows Host)

```powershell
# Start services
docker-compose up -d

# Stop services
docker-compose down

# View logs
docker logs comfyui-sandbox --tail 50 --follow

# Health check
curl http://localhost:8188/system_stats
```

## Verification Checklist

- [ ] Tailscale sidecar healthy: `docker ps` shows `ts-sidecar` as healthy
- [ ] ComfyUI healthy: `docker ps` shows `comfyui-sandbox` as healthy
- [ ] REST API accessible: `curl http://100.110.197.35:8188/system_stats` returns JSON
- [ ] Custom nodes loaded: `curl http://100.110.197.35:8188/extensions` shows non-core extensions
- [ ] Models visible: Check `/models/checkpoints`, `/models/unet`, `/models/loras` endpoints

## Rollback

To restore OpenClaw node (if needed):
```bash
# Restore from backup
cp docker-compose.yml.bak docker-compose.yml
docker-compose down
docker-compose up -d
```
