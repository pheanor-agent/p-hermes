# Model Roles Configuration (SSOT)
# SSOT: 이 파일이 모델 역할 매핑의 단일 진실 출처입니다.
# 변경 시 core/config/model-roles.yaml도 동기화 필요.
#
# 검증: python3 ~/.hermes/core/scripts/model_roles.py <role>
# 벤치마킹: JOB-1636 (GLM-5.2 vs Gemma-4 비교)
# 재평가: 2026-06-14 - 체급/추론 모드 고려한 모델 매핑 수정

roles:
  creative: zai/glm-5.2            # 설계/창의성: 추론 모드 + 200K 컨텍스트
  reasoning: zai/glm-5.2           # 추론/교훈 추출: 18% 빠름
  coding: airouter/Qwen3.6         # 코드 생성, 명령어 정확성
  review: airouter/Gemma-4         # 코드/설계 리뷰: design과 다른 모델로 교차 검증 (JOB-1642)
  default: airouter/Qwen3.6        # 기본 모델
  fast: airouter/Qwen3.6           # 빠른 응답

workflow_models:
  investigation: default
  design: creative                 # GLM-5.2 (추론 모드 + 체급 우위)
  review: review                   # Gemma-4 (design=GLM-5.2와 교차 검증)
  approval: default
  execution: coding
  test: reasoning                  # GLM-5.2 (교훈 추출 최적화)
  execution_review: review         # Gemma-4 (execution=Qwen3.6과 교차 검증)
  done: reasoning                  # GLM-5.2 (교훈 추출 최적화)

fallback_providers:
  - zai/glm-5.2
  - airouter/Qwen3.6

# 변경 이력
# - 2026-06-14: JOB-1636 벤치마킹 반영
# - 2026-06-14: 체급/추론 모드 고려 - design→GLM-5.2 수정
# - 2026-06-15: JOB-1642 — "Gemma-4 접근 불가(JOB-XXXX)" 근거 없는 주석 제거
# - 2026-06-15: JOB-1642 — review→Gemma-4 복원. design=GLM-5.2와 교차 검증 목적.
#               stalling/false completion은 단기 작업(review) + read_file 검증으로 완화.
